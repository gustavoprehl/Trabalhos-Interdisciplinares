<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="/styles/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
</head>

<body>
    <div id="side-menu" class="side-menu">
        <button id="close-menu" class="btn btn-danger">X</button>
        <ul id="list-menu" class="list-unstyled"></ul>
    </div>
    <div class="fixed-top header">
        <nav class="navbar navbar-expand navbar-light d-flex justify-content-around bg-transparent">
            <div class="col-3 align-items-center">
                <img src="/assets/logo.png" alt="logo" width="90px" height="90px" class="mr-1"/>
                <a class="navbar-brand font-weight-bold h-100" style="font-size: 2rem; color: white;" href="/index.html">PartyClub</a>
            </div>
            <form class="col-5">
                <input class="form-control w-100 bg-transparent search-input " type="text" placeholder="Search">
            </form>

            <div class="col-3 d-flex justify-content-end align-items-center">
                <button id="menu-toggle" class="btn">
                    <i class="fa fa-bars fa-1x" style="color: white; cursor: pointer; "></i>
                  </button>
            </div>
        </nav>
    </div>
    <div class="banner imagem-div">
        <img src="/assets/teste.jpg" class="img-fluid" alt="Responsive image">
    </div>
    </div>
    <div class="container">
        <div class="row mt-4">
            <h1 class="title-swipper">Festas em alta</h1>
            <swiper-container id="fire" class="mySwiper" pagination="true" pagination-clickable="false" space-between="0"
                slides-per-view="4" free-mode="true" keyboard="true" mousewheel="true" navigation="true"  />
        </div>
        <div class="row mt-4">
            <h1 class="title-swipper">As melhores</h1>
            <swiper-container id="best"class="mySwiper" pagination="true" pagination-clickable="false" space-between="0"
                slides-per-view="4" free-mode="true" keyboard="true" mousewheel="true" navigation="true"  />
        </div>
        <div class="row mt-4">
            <h1 id="artists-title" class="title-swipper">Principais atrações do</h1>
            <swiper-container id="artists"class="mySwiper" pagination="true" pagination-clickable="false" space-between="0"
                slides-per-view="4" free-mode="true" keyboard="true" mousewheel="true" navigation="true"  />
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-element-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            speed: 400,
            spaceBetween: 0,
        });
    </script>
     <script type="module" src="/js/home.js"></script>
</body>

</html>
