<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
</head>

<body>
    <div id="side-menu" class="side-menu">
        <button id="close-menu" class="btn btn-danger">X</button>
        <ul class="list-unstyled">
            <li><a href="#">Conta</a></li>
            <li><a href="#">Fotos</a></li>
            <li><a href="#">Configurações</a></li>
            <li><a href="#">Suporte</a></li>
        </ul>
    </div>
    <div class="fixed-top header">
        <nav class="navbar navbar-expand navbar-light d-flex justify-content-around bg-transparent">
            <div class="col-3 align-items-center">
                <img src="/assets/logo.png" alt="logo" width="90px" height="90px" class="mr-1" />
                <a class="navbar-brand font-weight-bold h-100" style="font-size: 2rem; color: white;"
                    href="/index.html">PartyClub</a>
            </div>
            <form class="col-5">
                <input class="form-control w-100 bg-transparent search-input " type="text" placeholder="Search">
            </form>

            <div class="col-3 d-flex justify-content-end align-items-center">
                <button id="menu-toggle" class="btn">
                    <i class="fa fa-bars fa-1x" style="color: white; cursor: pointer; "></i>
                </button>
            </div>
        </nav>
    </div>
    <div>
        <img src=""alt="Foto de Capa" class="cover-photo" id="cover-photo">     
        <img src="" alt="Foto de Perfil" class="profile-photo" id="profile-photo">
    </div>

    <div class="user-info">
        <h2 id="username"></h2>
        <p id="location"></p>
        <p id="bio"></p>
    </div>

    <div class="stats">
        <div class="stat">
            <h3 id="user-photos">13</h3>
            <p>Fotos</p>
        </div>
        <div class="linha-vertical"></div>
        <div class="stat">
            <h3 id="user-followers"></h3>
            <p>Seguidores</p>
        </div>
        <div class="linha-vertical"></div>
        <div class="stat">
            <h3 id="user-following"></h3>
            <p>Seguindo</p>
        </div>
    </div>

    <!-- Botões de seguir e mensagem -->
    <div class="buttons">
        <div style="max-width: 300px;">
            <div class="row">
                <div class="col-6">
                    <button id="follow-btn" class="btn w-100 btn-outline-primary" onclick="loadUserData()">Seguir</button>
                </div>
                <div class="col-6">
                    <button id="message-btn" class="btn w-100 btn-outline-secondary">Mensagem</button>
                </div>
            </div>
            <div class="row mt-2">
                <div class="col-12">
                    <button id="upload-btn" class="btn w-100 btn-outline-info">Upload de Fotos</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Box -->
    <div id="chat-box" class="chat-box">
        <div class="chat-header">
            <span>Chat</span>
            <button id="minimize-chat" class="btn btn-sm btn-outline-secondary">_</button>
        </div>
        <div class="chat-content">
            <p>Bem-vindo ao chat!</p>
            <!-- Conteúdo do chat -->
        </div>
        <div class="chat-footer">
            <input type="text" id="chat-input" class="form-control" placeholder="Digite sua mensagem...">
            <button id="send-chat" class="btn btn-primary">Enviar</button>
        </div>
    </div>


    <div>
        <swiper-container style="--swiper-navigation-color: #fff; --swiper-pagination-color: #fff" class="mySwiper"
            thumbs-swiper=".mySwiper2" loop="true" space-between="10" navigation="true">
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-1.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-2.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-3.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-4.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-5.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-6.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-7.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-8.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-9.jpg" />
            </swiper-slide>
            <swiper-slide>
                <img src="https://swiperjs.com/demos/images/nature-10.jpg" />
            </swiper-slide>
        </swiper-container>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-element-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
