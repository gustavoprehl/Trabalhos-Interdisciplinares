<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Evento - ClubParty</title>
    <link rel="stylesheet" href="/styles/editPageEvent.css">
</head>
<body>
    <header>
        <h1>ClubParty</h1>
    </header>
    <div class="edit-section">
        <div class="edit-item">
            <i class="fas fa-edit"></i> Nome do evento: <input type="text" value="CIA 2024">
        </div>
        <div class="edit-item">
            <i class="fas fa-edit"></i> Nome da empresa: <input type="text" value="PUC">
        </div>
        <div class="edit-item">
            <i class="fas fa-edit"></i> Data do evento: <input type="text" value="DD/MM/AAAA">
        </div>
        <div class="edit-item">
            <i class="fas fa-edit"></i> Status: <select>
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>
        <div class="edit-item">
            <i class="fas fa-edit"></i> Descrição: <textarea rows="4">Descrição do evento aqui...</textarea>
        </div>
        <button class="upload-button">Novo Upload de Fotos</button>
        <div class="button-group">
            <button class="close-button">Fechar</button>
            <button class="save-button">Salvar e Fechar</button>
        </div>
    </div>
</body>
</html>
