<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/eventPage.css">
</head>

<body>
    <div id="side-menu" class="side-menu">
        <button id="close-menu" class="btn btn-danger">X</button>
        <ul class="list-unstyled">
            <li><a href="/pages/profile.html">Perfil</a></li>
            <li><a href="#">Meus eventos</a></li>
        </ul>
    </div>
    <div class="fixed-top header">
        <nav class="navbar navbar-expand navbar-light d-flex justify-content-around bg-transparent">
            <div class="col-3 align-items-center">
                <img src="/assets/logo.png" alt="logo" width="90px" height="90px" class="mr-1" />
                <a class="navbar-brand font-weight-bold h-100" style="font-size: 2rem; color: white;" href="/index.html">PartyClub</a>
            </div>
            <form class="col-5">
                <input class="form-control w-100 bg-transparent search-input" type="text" placeholder="Search">
            </form>

            <div class="col-3 d-flex justify-content-end align-items-center">
                <button id="menu-toggle" class="btn">
                    <i class="fa fa-bars fa-1x" style="color: white; cursor: pointer;"></i>
                </button>
            </div>
        </nav>
    </div>

    <div class="container">
        <div id="iconeUsuario"></div>
        <div class="row">
            <div class="w-100">
                <img id="cover" src="/assets/image-2.png" alt="Principal" class="img-fluid rounded capa w-100">
            </div>
            <div class="">
                <img id="profile-pic" width="200" height="200" src="" alt="Perfil" class="profile-pic" >
            </div>
        </div>

        <div class="row" style="margin-top: 120px;">
            <div class="mb-1 w-100">
                <p id="info" class="text-center"></p>
            </div>
        </div>

        <div class="row">
            <div class="event-sections mb-4">
                <h3>Sobre o Evento</h3>
                <div class="event-section-content mt-4">
                    <p id="about"></p>
                </div>
                
            </div>
        </div>
        
        <div class="row">
            <div class="event-sections mb-4">
                <h3>Reviews</h3>
                <div id="reviews" class="event-section-content mt-4"></div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12 p-0">
                <div id="carouselExampleInterval" class="carousel slide" data-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://s2-ge.glbimg.com/bXWVS8kBwN156YOYIKfM5Y5JQD8=/540x304/top/smart/https://i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2023/u/M/Ct9QARR5edeKaXBYSLzw/foto-olhar-tomate-surpreendeu-a-todos-com-sua-energia-no-trio-eletrico-da-7a-cia.jpg" 
                            class="d-block w-100" alt="Primeira">
                        </div>
                        <div class="carousel-item">
                            <img src="https://s2-ge.glbimg.com/kd8UxGTUd6-CeYYKMwlMjpKyfl4=/0x0:1920x1282/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2022/k/n/KuRsaQTVufuidccFPCbw/imagem-1.jpg" 
                            class="d-block w-100" alt="Segunda">
                        </div>
                    </div>
                    <a class="carousel-control-prev" href="#carouselExampleInterval" role="button" data-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="sr-only">Anterior</span>
                    </a>
                    <a class="carousel-control-next" href="#carouselExampleInterval" role="button" data-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="sr-only">Próximo</span>
                    </a>
                </div>
            </div>
        </div>
        

        <div id="lineup" class="event-section-content mt-4">
            <div class="row justify-content-center mb-4"><h1>Atrações</h1></div>
            <div class="row" id="artists"></div>
        </div>

        <div class="mt-4">
            <h5>Média de Avaliações:</h5>
            <div id="average-rating" class="rating">
                <span class="star" data-value="1">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="5">&#9733;</span>
            </div>
        </div>
    
        <div class="row mt-4">
            <div class="col-md-12">
                <h4>Sua Avaliação:</h4>
                <div id="rating-stars" class="rating">
                    <span class="star" data-value="1">&#9733;</span>
                    <span class="star" data-value="2">&#9733;</span>
                    <span class="star" data-value="3">&#9733;</span>
                    <span class="star" data-value="4">&#9733;</span>
                    <span class="star" data-value="5">&#9733;</span>
                </div>
                <p class="mt-2" id="rating-value">Avalie este evento</p>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <h4>Comentários</h4>
                <div id="comment-section">
                    <div class="form-group">
                        <label for="comment">Seu Comentário:</label>
                        <textarea id="comment" class="form-control" rows="3"></textarea>
                    </div>
                    <button id="submit-comment" class="btn btn-primary" onclick="saveReview()">Enviar</button>
                </div>
                <div id="comments-list" class="mt-4">
                </div>
            </div>
        </div>
        

    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <script type="module" src="/js/eventPage.js"></script>
</body>

</html>
